name: Generate MDX Documentation

on:
  push:
    branches:
      - main
      - master
  repository_dispatch:
    types: [update-docs-event]

permissions:
  contents: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    
    steps:
      # Step 1: Apna Docs repo checkout karo
      - name: Checkout Docs Repository
        uses: actions/checkout@v4

      # Step 2: Company ka repo (Testing-Docs) bhi checkout karo ek alag folder me
      - name: Checkout Company Source Repo (Testing-Docs)
        uses: actions/checkout@v4
        with:
          repository: Katari-8055/Testing-Docs
          path: company-source

      # Step 3: Company repo ke source files ko apne src/ folder me copy karo
      - name: Copy Company Source Files
        run: |
          mkdir -p src
          # Company repo ke saare JS files apne src/ me copy karo
          cp -r company-source/src/* src/ 2>/dev/null || echo "No src/ in company repo, copying all JS files..."
          # Agar company repo me src/ folder nahi hai toh root se JS files copy karo
          find company-source -maxdepth 1 -name "*.js" -exec cp {} src/ \;
          echo "Files in src/ after copy:"
          ls -la src/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install

      - name: Run Documentation Generators
        run: |
          # 1. Extract JSDoc to JSON (ab company ke code se bhi JSDoc niklega)
          node scripts/extract-jsdoc.js
          
          # 2. Convert JSDoc JSON to MDX
          node scripts/json-to-mdx.js
          
          # 3. Update Mintlify navigation (mint.json)
          node scripts/update-mint-navigation.js
          
          # 4. Fetch GitHub READMEs as plugins
          node scripts/fetch-github-readme.js

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "docs(auto): Update generated MDX documentation and mint.json"
          file_pattern: 'docs/**/*.mdx api-docs.json mint.json'
